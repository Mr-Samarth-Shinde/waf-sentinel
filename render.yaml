services:
  - type: web
    name: waf-sentinel
    env: python
    region: singapore
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 waf.proxy:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0